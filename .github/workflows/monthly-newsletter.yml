name: Monthly NSE Insider Trades Newsletter

on:
  schedule:
    # Run on the 2nd of every month at 10:00 AM IST (04:30 UTC)
    - cron: '30 4 2 * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  send_newsletter:
    runs-on: ubuntu-latest
    name: Send Newsletter to Subscribers
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run insider scraper
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python insider_scraper.py
      
      - name: Upload CSVs to Google Drive (if exists)
        run: |
          if [ -f "buy_summary.csv" ] || [ -f "sell_summary.csv" ]; then
            echo "\u2713 Report files generated"
            ls -lh *.csv 2>/dev/null || echo "No CSV files found"
          else
            echo "\u26a0 No CSV files generated - may use previous month data"
          fi
      
      - name: Send newsletters to subscribers
        env:
          SUBSCRIBERS_SHEET_ID: ${{ secrets.SUBSCRIBERS_SHEET_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python newsletter_sender.py
      
      - name: Post to Twitter/X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          # TODO: Implement Twitter posting with report summary
          echo "\ud83d\udc68\u200d\ud83d\udcbb Placeholder for Twitter/X posting"
      
      - name: Post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          # TODO: Implement LinkedIn posting
          echo "\ud83d\udc68\u200d\ud83d\udcbb Placeholder for LinkedIn posting"
      
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        if: success()
        run: |
          echo "\u2713 Newsletter workflow completed successfully"
          # TODO: Implement Telegram notification
      
      - name: Handle failure notification
        if: failure()
        run: |
          echo "\u2717 Newsletter workflow failed"
          echo "Check GitHub Actions logs for details"

  # Optional: Archive workflow artifacts
  archive_reports:
    runs-on: ubuntu-latest
    needs: send_newsletter
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: insider-reports
          path: |
            buy_summary.csv
            sell_summary.csv
            raw_insider_data.csv
          retention-days: 90
